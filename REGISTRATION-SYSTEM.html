<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen | Job Fair & Summary System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #10b981;
            --danger: #ef4444;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: #f1f5f9;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* NAVIGATION */
        .nav {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 20px;
            box-sizing: border-box;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .live-clock {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
            background: var(--glass);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .nav-buttons button {
            padding: 10px 22px;
            margin-left: 10px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: white;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        .nav-buttons button:hover {
            background: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        /* PANELS */
        .container { width: 95%; max-width: 900px; margin-bottom: 50px; }

        .panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* FORM ELEMENTS */
        label { display: block; margin-top: 15px; font-size: 0.8rem; color: #94a3b8; font-weight: 800; letter-spacing: 1px; }
        
        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: white;
            box-sizing: border-box;
            font-family: inherit;
        }

        .btn-main {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        /* SUMMARY GENERATOR STYLES */
        .summary-header {
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.85rem;
        }

        .summary-table th {
            text-align: left;
            padding: 12px;
            color: var(--secondary);
            border-bottom: 1px solid var(--glass-border);
        }

        .summary-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--glass-border);
        }

        .stat-card h3 { margin: 0; color: var(--primary); font-size: 1.8rem; }
        .stat-card p { margin: 5px 0 0; font-size: 0.7rem; color: #94a3b8; font-weight: 800; }

        .hidden { display: none; }

        #toast {
            position: fixed;
            bottom: 30px;
            padding: 15px 30px;
            background: var(--accent);
            border-radius: 15px;
            font-weight: 800;
            transform: translateY(150px);
            transition: 0.5s;
            z-index: 1000;
        }
        #toast.active { transform: translateY(0); }
    </style>
</head>
<body>

<div class="nav">
    <div class="logo">Campus Job Fair Registration System</div>
    <div id="displayTime" class="live-clock">00:00:00</div>
    <div class="nav-buttons">
        <button onclick="showPanel('studentPanel')">Register</button>
        <button onclick="showPanel('adminPanel')">Admin Portal</button>
    </div>
</div>

<div class="container">
    <div class="panel" id="studentPanel">
        <h1 style="margin:0">Student Registration </h1>
        <p id="todayDate" style="color: var(--primary); font-weight: 800; margin-top: 5px;"></p>
        
        <form id="regForm">
            <label>STUDENT FULL NAME</label>
            <input type="text" id="name" placeholder="Enter name" required>
            
            <label>STUDENT ID (UNIQUE)</label>
            <input type="text" id="id" placeholder="e.g. 2024-001" required>
            
            <label>DEPARTMENT / MAJOR</label>
            <input type="text" id="major" placeholder="Computer Science" required>
            
            <label>RESUME FILE</label>
            <input type="file" id="fileUpload" style="padding: 10px;">

            <button type="submit" class="btn-main">Submit Registration</button>
        </form>
    </div>

    <div class="panel hidden" id="loginPanel">
        <div style="text-align: center; max-width: 350px; margin: 40px auto;">
            <h2>Admin Authentication</h2>
            <input type="password" id="adminPass" placeholder="System Key">
            <button onclick="verifyAdmin()" class="btn-main">Login</button>
            <p id="error" style="color:var(--danger); font-size: 0.8rem; margin-top: 10px;"></p>
        </div>
    </div>

    <div class="panel hidden" id="adminPanel">
        <div class="summary-header">
            <div>
                <h1 style="margin:0; font-size: 1.5rem;">SUMMARY GENERATOR</h1>
                <p style="color:#94a3b8; font-size: 0.8rem; margin:0;">Iterating Through <b>ArrayList&lt;Student&gt;</b></p>
            </div>
            <button onclick="showPanel('studentPanel')" style="background:none; border:1px solid var(--danger); color:var(--danger); padding:5px 15px; border-radius:10px; cursor:pointer;">Exit</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3 id="totalCount">0</h3><p>TOTAL REGISTERED</p></div>
            <div class="stat-card"><h3 id="morningCount">0</h3><p>MORNING SLOTS</p></div>
            <div class="stat-card"><h3 id="afternoonCount">0</h3><p>AFTERNOON SLOTS</p></div>
        </div>

        <div style="background: rgba(0,0,0,0.2); border-radius: 20px; padding: 20px; border: 1px solid var(--glass-border);">
            <h3 style="margin-top:0; color:var(--secondary); font-size: 1rem;">Structured Student Details</h3>
            <div style="overflow-x: auto;">
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Dept</th>
                            <th>Slot</th>
                            <th>Time Stamp</th>
                        </tr>
                    </thead>
                    <tbody id="summaryBody">
                        </tbody>
                </table>
            </div>
        </div>

        <button onclick="exportLog()" class="btn-main" style="background: var(--accent);">Export Audit Log (.log)</button>
    </div>
</div>

<div id="toast">✅ Registration Recorded Successfully</div>

<script>
    // Concept Used: List (Simulated ArrayList)
    let studentArrayList = []; 
    const ADMIN_KEY = "admin123";

    // 1. DYNAMIC TIME SYSTEM
    function updateClock() {
        const now = new Date();
        document.getElementById('displayTime').innerText = now.toLocaleTimeString();
        document.getElementById('todayDate').innerText = "System Date: " + now.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function showPanel(id) {
        // Simple view switcher
        if(id === 'adminPanel') { showPanel('loginPanel'); return; }
        document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // 2. REGISTRATION & SLOT ASSIGNMENT
    document.getElementById('regForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const sid = document.getElementById('id').value;
        // Logic check for unique ID
        if (studentArrayList.some(s => s.id === sid)) {
            alert("Java Exception: Student ID already exists!");
            return;
        }

        const now = new Date();
        // Concept: Object instantiation added to List
        const newStudent = {
            id: sid,
            name: document.getElementById('name').value,
            major: document.getElementById('major').value,
            slot: calculateSlot(),
            timestamp: now.toLocaleDateString() + " " + now.toLocaleTimeString()
        };

        studentArrayList.push(newStudent);
        this.reset();
        showToast();
        generateSummary(); // Refresh summary iteration
    });

    function calculateSlot() {
        const morningCount = studentArrayList.filter(s => s.slot === "Morning").length;
        return morningCount < 10 ? "Morning" : "Afternoon";
    }

    // 3. SUMMARY GENERATOR (Core Module)
    function generateSummary() {
        const tbody = document.getElementById('summaryBody');
        tbody.innerHTML = "";

        // Concept: ArrayList Iteration using Enhanced For Loop logic
        studentArrayList.forEach(student => {
            const row = `
                <tr>
                    <td style="font-weight:800; color:var(--primary)">${student.id}</td>
                    <td>${student.name}</td>
                    <td>${student.major}</td>
                    <td><span style="color:${student.slot === 'Morning' ? 'var(--accent)' : 'var(--secondary)'}">${student.slot}</span></td>
                    <td style="font-size: 0.7rem; color:#64748b;">${student.timestamp}</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });

        // Update Statistics
        document.getElementById('totalCount').innerText = studentArrayList.length;
        document.getElementById('morningCount').innerText = studentArrayList.filter(s => s.slot === "Morning").length;
        document.getElementById('afternoonCount').innerText = studentArrayList.filter(s => s.slot === "Afternoon").length;
    }

    // 4. ADMIN AUTHENTICATION
    function verifyAdmin() {
        const pass = document.getElementById('adminPass').value;
        if (pass === ADMIN_KEY) {
            document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
            document.getElementById('adminPanel').classList.remove('hidden');
            generateSummary();
        } else {
            document.getElementById('error').innerText = "Invalid System Key!";
        }
    }

    // 5. EXPORT LOG FILE
    function exportLog() {
        let logData = `--- JOB FAIR SYSTEM AUDIT LOG ---\nGenerated: ${new Date().toLocaleString()}\n\n`;
        
        // Iterating through data for the log file
        studentArrayList.forEach(s => {
            logData += `[${s.timestamp}] INFO: StudentID=${s.id} | Name=${s.name} | Slot=${s.slot}\n`;
        });

        const blob = new Blob([logData], { type: "text/plain" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `jobfair_summary_audit.log`;
        a.click();
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 3000);
    }
</script>

</body>
</html>
